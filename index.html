<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bangla RC Car Control</title>
<style>
  body { font-family: sans-serif; text-align: center; background:#111; color:#eee; padding: 20px; }
  button { font-size: 18px; padding: 14px 22px; margin: 8px; border-radius: 10px; border:none; }
  #connectBtn { background:#2563eb; color:white; }
  #micBtn { background:#16a34a; color:white; }
  #micBtn.listening { background:#dc2626; }
  #log { text-align:left; max-width:480px; margin:20px auto; background:#1e1e1e; padding:10px;
         border-radius:8px; height:260px; overflow-y:auto; font-size:14px; }
  .you { color:#7dd3fc; }
  .car { color:#86efac; }
  #status { margin-top:10px; font-size:14px; color:#aaa; }
</style>
</head>
<body>
  <h2>বাংলা RC কার কন্ট্রোল</h2>
  <button id="connectBtn">গাড়ির সাথে সংযোগ করুন</button>
  <br>
  <button id="micBtn" disabled>🎤 বলুন</button>
  <div id="status">সংযোগ নেই</div>
  <div id="log"></div>

<script>
/*
  Requires Chrome/Edge on Android (Web Bluetooth) or Chrome desktop.
  iOS Safari does not support Web Bluetooth — use "Bluefy" browser app on iPhone instead.
  Must be served over https:// or from localhost (Web Bluetooth requirement).
*/

const SERVICE_UUID = "6e400001-b5a3-f393-e0a9-e50e24dcca9e";
const CHAR_RX_UUID = "6e400002-b5a3-f393-e0a9-e50e24dcca9e"; // write to car
const CHAR_TX_UUID = "6e400003-b5a3-f393-e0a9-e50e24dcca9e"; // notify from car

let device, rxChar, txChar;
let recognizing = false;

const connectBtn = document.getElementById('connectBtn');
const micBtn = document.getElementById('micBtn');
const statusEl = document.getElementById('status');
const logEl = document.getElementById('log');

function log(who, text) {
  const p = document.createElement('div');
  p.className = who;
  p.textContent = (who === 'you' ? 'আপনি: ' : 'গাড়ি: ') + text;
  logEl.appendChild(p);
  logEl.scrollTop = logEl.scrollHeight;
}

function speakBangla(text) {
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'bn-BD';
  speechSynthesis.speak(u);
}

connectBtn.addEventListener('click', async () => {
  try {
    device = await navigator.bluetooth.requestDevice({
      filters: [{ name: 'BanglaRC-Car' }],
      optionalServices: [SERVICE_UUID]
    });
    const server = await device.gatt.connect();
    const service = await server.getPrimaryService(SERVICE_UUID);
    rxChar = await service.getCharacteristic(CHAR_RX_UUID);
    txChar = await service.getCharacteristic(CHAR_TX_UUID);

    await txChar.startNotifications();
    txChar.addEventListener('characteristicvaluechanged', (e) => {
      const text = new TextDecoder().decode(e.target.value);
      log('car', text);
      speakBangla(text);
    });

    statusEl.textContent = 'সংযুক্ত ✅';
    micBtn.disabled = false;

    device.addEventListener('gattserverdisconnected', () => {
      statusEl.textContent = 'সংযোগ বিচ্ছিন্ন হয়েছে';
      micBtn.disabled = true;
    });
  } catch (err) {
    statusEl.textContent = 'সংযোগ ব্যর্থ: ' + err;
  }
});

async function sendCommand(cmd) {
  if (!rxChar) return;
  await rxChar.writeValue(new TextEncoder().encode(cmd));
  log('you', cmd);
}

// Map recognized speech to the exact canonical words the car understands.
// Add more phrasings on the left as you find what your voice tends to produce.
const COMMAND_MAP = [
  { keys: ['সামনে', 'সামনে যাও', 'এগিয়ে যাও'], cmd: 'সামনে' },
  { keys: ['পেছনে', 'পিছনে', 'পিছনে যাও'], cmd: 'পেছনে' },
  { keys: ['বামে', 'বামে যাও', 'বাম দিকে'], cmd: 'বামে' },
  { keys: ['ডানে', 'ডানে যাও', 'ডান দিকে'], cmd: 'ডানে' },
  { keys: ['থামো', 'থাম', 'দাঁড়াও'], cmd: 'থামো' },
  { keys: ['ফলো করো', 'আমাকে ফলো করো', 'ফলো'], cmd: 'ফলো' },
  { keys: ['ফলো বন্ধ', 'ফলো বন্ধ করো'], cmd: 'ফলো বন্ধ' },
  { keys: ['খোলো', 'বক্স খোলো', 'ওষুধ দাও'], cmd: 'খোলো' },
  { keys: ['বন্ধ করো', 'বক্স বন্ধ করো', 'বন্ধ'], cmd: 'বন্ধ' },
  { keys: ['স্ট্যাটাস', 'অবস্থা কি'], cmd: 'স্ট্যাটাস' },
];

function matchCommand(heard) {
  heard = heard.trim();
  for (const entry of COMMAND_MAP) {
    for (const key of entry.keys) {
      if (heard.includes(key)) return entry.cmd;
    }
  }
  return null;
}

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition;
if (SpeechRecognition) {
  recognition = new SpeechRecognition();
  recognition.lang = 'bn-BD';
  recognition.continuous = true;
  recognition.interimResults = false;

  recognition.onresult = (event) => {
    const heard = event.results[event.results.length - 1][0].transcript;
    log('you', '(শুনেছি) ' + heard);
    const cmd = matchCommand(heard);
    if (cmd) {
      sendCommand(cmd);
    } else {
      speakBangla('দুঃখিত, বুঝতে পারিনি');
    }
  };

  recognition.onend = () => {
    if (recognizing) recognition.start(); // keep listening
  };
} else {
  statusEl.textContent = 'এই ব্রাউজারে ভয়েস সাপোর্ট নেই';
}

micBtn.addEventListener('click', () => {
  if (!recognition) return;
  recognizing = !recognizing;
  micBtn.classList.toggle('listening', recognizing);
  micBtn.textContent = recognizing ? '🎤 শুনছি...' : '🎤 বলুন';
  if (recognizing) recognition.start();
  else recognition.stop();
});
</script>
</body>
</html>
